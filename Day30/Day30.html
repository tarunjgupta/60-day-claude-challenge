<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supply Chain Builder — Interactive Simulator</title>
<meta name="description" content="Learn supply chain management through an interactive simulation. Build your own supply chain, make strategic decisions, and see real-time business impact."/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2035;
    --bg-card-hover: #1f2847;
    --bg-card-alt: #151c2e;
    --border-subtle: rgba(99, 130, 255, 0.12);
    --border-active: rgba(99, 130, 255, 0.35);
    --text-primary: #e8ecf4;
    --text-secondary: #8892a8;
    --text-muted: #5a6478;
    --accent-blue: #6382ff;
    --accent-cyan: #38d9e8;
    --accent-green: #34d399;
    --accent-amber: #f59e0b;
    --accent-red: #ef4444;
    --accent-purple: #a78bfa;
    --accent-pink: #f472b6;
    --gradient-primary: linear-gradient(135deg, #6382ff 0%, #38d9e8 100%);
    --gradient-green: linear-gradient(135deg, #34d399 0%, #06b6d4 100%);
    --gradient-amber: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
    --gradient-purple: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.35);
    --shadow-glow: 0 0 30px rgba(99, 130, 255, 0.15);
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #root { min-height: 100vh; }

  .app-container {
    min-height: 100vh;
    position: relative;
  }

  /* Background grid effect */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(99, 130, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 130, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .bg-glow {
    position: fixed; z-index: 0; pointer-events: none;
    width: 600px; height: 600px; border-radius: 50%;
    filter: blur(120px); opacity: 0.08;
  }
  .bg-glow-1 { top: -200px; left: -100px; background: var(--accent-blue); }
  .bg-glow-2 { bottom: -200px; right: -100px; background: var(--accent-cyan); }

  .content-wrapper {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto; padding: 24px;
  }

  /* ===== HEADER / NAV ===== */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; margin-bottom: 24px; border-bottom: 1px solid var(--border-subtle);
  }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    background: var(--gradient-primary); display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #fff;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-text span { color: var(--accent-cyan); }

  .step-indicator {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-card); padding: 6px 16px; border-radius: 100px;
    font-size: 13px; color: var(--text-secondary); border: 1px solid var(--border-subtle);
  }
  .step-indicator .current { color: var(--accent-cyan); font-weight: 600; }

  /* ===== CARDS ===== */
  .card {
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg); padding: 32px;
    box-shadow: var(--shadow-card); transition: var(--transition-smooth);
  }
  .card:hover { border-color: var(--border-active); }
  .card-glow {
    box-shadow: var(--shadow-card), var(--shadow-glow);
  }

  /* ===== WELCOME SCREEN ===== */
  .welcome-hero {
    text-align: center; padding: 60px 20px; animation: fadeSlideUp 0.8s ease-out;
  }
  .welcome-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(99, 130, 255, 0.1); border: 1px solid rgba(99, 130, 255, 0.2);
    border-radius: 100px; padding: 8px 20px; font-size: 13px; font-weight: 500;
    color: var(--accent-blue); margin-bottom: 28px;
  }
  .welcome-badge .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green);
    animation: pulse 2s infinite;
  }
  .welcome-hero h1 {
    font-size: clamp(32px, 5vw, 56px); font-weight: 900;
    letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 20px;
  }
  .welcome-hero h1 .gradient-text {
    background: var(--gradient-primary); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
  }
  .welcome-hero .subtitle {
    font-size: 18px; color: var(--text-secondary); max-width: 600px;
    margin: 0 auto 40px; line-height: 1.7;
  }

  .concept-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px; max-width: 900px; margin: 0 auto 48px;
  }
  .concept-card {
    background: var(--bg-card-alt); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: 24px; text-align: left;
    transition: var(--transition-smooth); cursor: default;
  }
  .concept-card:hover {
    transform: translateY(-4px); border-color: var(--border-active);
    box-shadow: var(--shadow-glow);
  }
  .concept-card .icon {
    font-size: 28px; margin-bottom: 12px; display: block;
  }
  .concept-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .concept-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  /* ===== BUTTONS ===== */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--gradient-primary); color: #fff; border: none;
    border-radius: 100px; padding: 14px 36px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: var(--transition-smooth); font-family: inherit;
    letter-spacing: -0.2px;
  }
  .btn-primary:hover {
    transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99, 130, 255, 0.35);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-subtle);
    border-radius: 100px; padding: 12px 28px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: var(--transition-smooth); font-family: inherit;
  }
  .btn-secondary:hover {
    border-color: var(--border-active); background: var(--bg-card-hover);
  }

  /* ===== COMPANY PROFILE ===== */
  .company-profile {
    animation: fadeSlideUp 0.6s ease-out;
  }
  .company-header {
    display: flex; align-items: center; gap: 20px; margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .company-avatar {
    width: 72px; height: 72px; border-radius: var(--radius-md);
    background: var(--gradient-primary); display: flex; align-items: center;
    justify-content: center; font-size: 32px; flex-shrink: 0;
  }
  .company-info h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .company-info .industry-tag {
    display: inline-block; margin-top: 4px;
    background: rgba(56, 217, 232, 0.1); border: 1px solid rgba(56, 217, 232, 0.2);
    border-radius: 100px; padding: 4px 14px; font-size: 12px;
    color: var(--accent-cyan); font-weight: 500;
  }

  .company-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-card-alt); border-radius: var(--radius-sm);
    padding: 18px; border: 1px solid var(--border-subtle);
  }
  .stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-card .value { font-size: 18px; font-weight: 700; }

  /* ===== DECISION STEPS ===== */
  .decision-screen { animation: fadeSlideUp 0.5s ease-out; }

  .edu-banner {
    background: linear-gradient(135deg, rgba(99, 130, 255, 0.08) 0%, rgba(56, 217, 232, 0.05) 100%);
    border: 1px solid rgba(99, 130, 255, 0.15); border-radius: var(--radius-md);
    padding: 24px 28px; margin-bottom: 28px;
  }
  .edu-banner .edu-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .edu-banner .edu-icon { font-size: 22px; }
  .edu-banner h3 { font-size: 16px; font-weight: 700; color: var(--accent-cyan); }
  .edu-banner p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

  .option-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .option-card {
    background: var(--bg-card-alt); border: 2px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: 24px; cursor: pointer;
    transition: var(--transition-smooth); position: relative; overflow: hidden;
  }
  .option-card:hover {
    border-color: var(--border-active); transform: translateY(-3px);
    box-shadow: var(--shadow-glow);
  }
  .option-card.selected {
    border-color: var(--accent-blue);
    background: rgba(99, 130, 255, 0.08);
  }
  .option-card.selected::before {
    content: '✓'; position: absolute; top: 12px; right: 12px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent-blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .option-card .opt-icon { font-size: 28px; margin-bottom: 12px; display: block; }
  .option-card h4 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .option-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .trade-off-box {
    background: rgba(245, 158, 11, 0.06); border: 1px solid rgba(245, 158, 11, 0.15);
    border-radius: var(--radius-sm); padding: 16px 20px; margin-top: 12px;
  }
  .trade-off-box .trade-title {
    font-size: 13px; font-weight: 600; color: var(--accent-amber); margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .trade-off-box p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  /* ===== METRICS BAR ===== */
  .metrics-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border-subtle);
  }
  .metric-item { text-align: center; }
  .metric-item .metric-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-muted); margin-bottom: 8px;
  }
  .metric-item .metric-value {
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .metric-bar-wrap {
    height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px;
    overflow: hidden;
  }
  .metric-bar-fill {
    height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .metric-bar-fill.cost { background: var(--gradient-primary); }
  .metric-bar-fill.speed { background: var(--gradient-green); }
  .metric-bar-fill.risk { background: var(--gradient-amber); }
  .metric-bar-fill.satisfaction { background: var(--gradient-purple); }
  .metric-bar-fill.sustainability { background: linear-gradient(135deg, var(--accent-green), #22d3ee); }

  /* ===== DASHBOARD ===== */
  .dashboard { animation: fadeSlideUp 0.6s ease-out; }

  .score-ring-container {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 36px;
  }
  .score-ring {
    position: relative; width: 200px; height: 200px;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .bg-ring { stroke: rgba(255,255,255,0.06); }
  .score-ring .fg-ring {
    transition: stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 8px rgba(99, 130, 255, 0.4));
  }
  .score-number {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-number .big {
    font-size: 48px; font-weight: 900; letter-spacing: -2px;
    background: var(--gradient-primary); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .score-number .label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .score-grade {
    margin-top: 12px; font-size: 16px; font-weight: 700;
    padding: 4px 20px; border-radius: 100px;
  }

  .dashboard-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px; margin-bottom: 28px;
  }
  .dash-card {
    background: var(--bg-card-alt); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: 24px;
    transition: var(--transition-smooth);
  }
  .dash-card:hover { border-color: var(--border-active); }
  .dash-card h3 {
    font-size: 14px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  .strength-list, .weakness-list, .improvement-list {
    list-style: none; display: flex; flex-direction: column; gap: 10px;
  }
  .strength-list li, .weakness-list li, .improvement-list li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 14px; color: var(--text-secondary); line-height: 1.6;
  }
  .strength-list li .dot { color: var(--accent-green); font-weight: 700; flex-shrink: 0; }
  .weakness-list li .dot { color: var(--accent-red); font-weight: 700; flex-shrink: 0; }
  .improvement-list li .num {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(99, 130, 255, 0.15); color: var(--accent-blue);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }

  .risk-banner {
    background: rgba(239, 68, 68, 0.06); border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: var(--radius-md); padding: 20px 24px; margin-bottom: 20px;
  }
  .risk-banner h4 {
    font-size: 14px; font-weight: 700; color: var(--accent-red);
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .risk-banner p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  .action-bar {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-subtle);
  }

  /* ===== PROGRESS BAR (TOP) ===== */
  .progress-track {
    height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px;
    margin-bottom: 32px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--gradient-primary); border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes scoreReveal {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .fade-in { animation: fadeSlideUp 0.5s ease-out; }
  .score-animate { animation: scoreReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .content-wrapper { padding: 16px; }
    .welcome-hero { padding: 40px 12px; }
    .card { padding: 20px; }
    .option-grid { grid-template-columns: 1fr; }
    .company-header { flex-direction: column; text-align: center; }
    .top-bar { flex-direction: column; gap: 12px; }
    .dashboard-grid { grid-template-columns: 1fr; }
    .metrics-bar { grid-template-columns: repeat(2, 1fr); }
  }

  /* ===== CHOICE SUMMARY TABLE ===== */
  .choice-summary-table {
    width: 100%; border-collapse: collapse; margin-top: 12px;
  }
  .choice-summary-table th,
  .choice-summary-table td {
    text-align: left; padding: 10px 14px; font-size: 13px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .choice-summary-table th {
    color: var(--text-muted); font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; font-size: 11px;
  }
  .choice-summary-table td { color: var(--text-secondary); }
  .choice-summary-table td:last-child { font-weight: 600; color: var(--text-primary); }

  /* ===== METRIC FINAL CARDS ===== */
  .final-metrics-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .final-metric-card {
    background: var(--bg-card-alt); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm); padding: 20px; text-align: center;
    transition: var(--transition-smooth);
  }
  .final-metric-card:hover { border-color: var(--border-active); transform: translateY(-2px); }
  .final-metric-card .fm-icon { font-size: 24px; margin-bottom: 8px; }
  .final-metric-card .fm-label {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .final-metric-card .fm-value { font-size: 28px; font-weight: 800; }
  .final-metric-card .fm-bar {
    height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px;
    margin-top: 10px; overflow: hidden;
  }
  .final-metric-card .fm-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ===== DATA & CONFIGURATION ===== */
const INDUSTRIES = [
  { name: "Consumer Electronics", icon: "📱", products: ["Smartphones", "Laptops", "Tablets", "Wearables", "Smart Speakers"], base: { cost: 60, speed: 55, risk: 50, satisfaction: 60, sustainability: 45 } },
  { name: "Fresh Foods & Beverages", icon: "🥑", products: ["Organic Produce", "Craft Beverages", "Meal Kits", "Dairy Products", "Frozen Goods"], base: { cost: 50, speed: 70, risk: 60, satisfaction: 65, sustainability: 55 } },
  { name: "Fashion & Apparel", icon: "👗", products: ["Streetwear", "Athleisure", "Luxury Bags", "Sustainable Clothing", "Accessories"], base: { cost: 55, speed: 50, risk: 45, satisfaction: 55, sustainability: 50 } },
  { name: "Pharmaceuticals", icon: "💊", products: ["Vaccines", "OTC Medicines", "Medical Devices", "Supplements", "Diagnostics"], base: { cost: 45, speed: 60, risk: 70, satisfaction: 50, sustainability: 40 } },
  { name: "Automotive Parts", icon: "🚗", products: ["EV Batteries", "Brake Systems", "Sensors", "Infotainment Units", "Tires"], base: { cost: 40, speed: 45, risk: 55, satisfaction: 50, sustainability: 42 } },
  { name: "Home & Furniture", icon: "🛋️", products: ["Smart Furniture", "Lighting", "Kitchen Appliances", "Mattresses", "Décor"], base: { cost: 55, speed: 40, risk: 35, satisfaction: 60, sustainability: 55 } },
];

const REGIONS = ["North America", "Europe", "Asia-Pacific", "Latin America", "Middle East & Africa"];
const DEMAND_LEVELS = [
  { level: "Moderate", desc: "Steady demand with seasonal peaks", multiplier: 1.0 },
  { level: "High", desc: "Strong growth; frequent restocking needed", multiplier: 1.2 },
  { level: "Explosive", desc: "Viral demand; supply struggles to keep up", multiplier: 1.5 },
];

function generateCompany() {
  const industry = INDUSTRIES[Math.floor(Math.random() * INDUSTRIES.length)];
  const numProducts = 2 + Math.floor(Math.random() * 2);
  const shuffled = [...industry.products].sort(() => Math.random() - 0.5);
  const products = shuffled.slice(0, numProducts);
  const numRegions = 1 + Math.floor(Math.random() * 3);
  const regionShuffled = [...REGIONS].sort(() => Math.random() - 0.5);
  const regions = regionShuffled.slice(0, numRegions);
  const demand = DEMAND_LEVELS[Math.floor(Math.random() * DEMAND_LEVELS.length)];
  const names = ["NovaTech", "UrbanFlow", "VerdantCo", "Pinnacle", "ZenithEdge", "ArcticWave", "BloomPath", "EchoVista", "QuantumLeap", "TerraPulse", "LuminArc", "CrestLine"];
  const name = names[Math.floor(Math.random() * names.length)];
  const revenue = (5 + Math.floor(Math.random() * 95)) + "M";

  return { name, industry, products, regions, demand, revenue, baseMetrics: { ...industry.base } };
}

/* ===== DECISION DEFINITIONS ===== */
const DECISIONS = [
  {
    id: "supplier",
    title: "Supplier Strategy",
    icon: "🏭",
    education: {

/* ===== SCORE & ANALYSIS ENGINE ===== */
function computeScore(metrics) {
  const weights = { cost: 0.2, speed: 0.2, risk: 0.2, satisfaction: 0.25, sustainability: 0.15 };
  let score = 0;
  for (const key of Object.keys(weights)) {
    const clamped = Math.max(0, Math.min(100, metrics[key]));
    score += clamped * weights[key];
  }
  return Math.round(score);
}

function getGrade(score) {
  if (score >= 90) return { grade: "S", label: "World-Class", color: "#34d399", bg: "rgba(52,211,153,0.12)" };
  if (score >= 80) return { grade: "A", label: "Excellent", color: "#6382ff", bg: "rgba(99,130,255,0.12)" };
  if (score >= 70) return { grade: "B", label: "Strong", color: "#38d9e8", bg: "rgba(56,217,232,0.12)" };
  if (score >= 55) return { grade: "C", label: "Average", color: "#f59e0b", bg: "rgba(245,158,11,0.12)" };
  if (score >= 40) return { grade: "D", label: "Below Average", color: "#f97316", bg: "rgba(249,115,22,0.12)" };
  return { grade: "F", label: "Critical Issues", color: "#ef4444", bg: "rgba(239,68,68,0.12)" };
}

function analyzeChain(metrics, choices) {
  const sorted = Object.entries(metrics).sort((a, b) => b[1] - a[1]);
  const metricNames = { cost: "Cost Efficiency", speed: "Delivery Speed", risk: "Risk Resilience", satisfaction: "Customer Satisfaction", sustainability: "Sustainability" };

  const strengths = sorted.filter(([, v]) => v >= 65).slice(0, 3).map(([k]) => metricNames[k]);
  const weaknesses = sorted.filter(([, v]) => v < 55).slice(-3).map(([k]) => metricNames[k]);

  if (strengths.length === 0) strengths.push(metricNames[sorted[0][0]]);
  if (weaknesses.length === 0) weaknesses.push(metricNames[sorted[sorted.length - 1][0]]);

  const worstKey = sorted[sorted.length - 1][0];
  const riskMap = {
    cost: { title: "Cost Overruns", desc: "Your supply chain is expensive to operate. Rising input costs or economic downturns could squeeze margins and force difficult cutbacks." },
    speed: { title: "Slow Delivery Times", desc: "Long lead times risk losing customers to faster competitors. In today's market, speed is often more important than price." },
    risk: { title: "Supply Chain Fragility", desc: "Your chain lacks resilience. A single disruption — pandemic, natural disaster, geopolitical event — could halt operations." },
    satisfaction: { title: "Customer Dissatisfaction", desc: "Low satisfaction means you're at risk of losing market share. Customers have many alternatives and little patience." },
    sustainability: { title: "Environmental Impact", desc: "High carbon footprint and unsustainable practices create regulatory risk and damage brand reputation with eco-conscious consumers." },
  };
  const biggestRisk = riskMap[worstKey];

  const improvements = [];
  if (metrics.cost < 60) improvements.push("Negotiate volume discounts with suppliers or switch to nearshore manufacturing to cut logistics costs by 15-25%.");
  if (metrics.speed < 60) improvements.push("Add regional distribution centers to reduce last-mile delivery time from 5-7 days to 2-3 days.");
  if (metrics.risk < 60) improvements.push("Diversify your supplier base to at least two sources for critical materials to avoid single-point-of-failure risks.");
  if (metrics.satisfaction < 60) improvements.push("Implement real-time order tracking and improve inventory accuracy to reduce stockouts and boost customer confidence.");
  if (metrics.sustainability < 60) improvements.push("Shift a portion of freight from air/road to rail, and source from suppliers with verified sustainability certifications.");
  if (improvements.length < 3) improvements.push("Invest in demand forecasting AI to better align inventory with actual customer needs, reducing waste by 20-30%.");
  if (improvements.length < 3) improvements.push("Create a supply chain control tower for real-time visibility across all nodes, enabling proactive issue resolution.");
  if (improvements.length < 3) improvements.push("Build strategic partnerships with key suppliers through long-term contracts that include innovation-sharing clauses.");

  return { strengths, weaknesses, biggestRisk, improvements: improvements.slice(0, 3) };
}

        <h3 style={{ fontSize: "16px", fontWeight: 700, marginBottom: "12px", display: "flex", alignItems: "center", gap: "8px" }}>
          📋 Your Decisions Summary
        </h3>
        <table className="choice-summary-table">
          <thead>
            <tr>
              <th>Decision</th>
              <th>Your Choice</th>
            </tr>
          </thead>
          <tbody>
            {Object.entries(choices).map(([key, val]) => (
              <tr key={key}>
                <td style={{ textTransform: "capitalize" }}>{key === "transport" ? "Transportation" : key}</td>
                <td>{choiceLabels[key]?.[val] || val}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="action-bar">
        <button className="btn-primary" onClick={onReplay} id="btn-replay">
          🔄 Play Again with New Company
        </button>
      </div>
    </div>
  );
}

/* ===== MAIN APP ===== */
function App() {
  const [screen, setScreen] = useState("welcome"); // welcome | company | decision | dashboard
  const [company, setCompany] = useState(null);
  const [decisionIndex, setDecisionIndex] = useState(0);
  const [metrics, setMetrics] = useState({ cost: 50, speed: 50, risk: 50, satisfaction: 50, sustainability: 50 });
  const [choices, setChoices] = useState({});

  const startGame = useCallback(() => {
    const c = generateCompany();
    setCompany(c);
    setMetrics({ ...c.baseMetrics });
    setChoices({});
    setDecisionIndex(0);
    setScreen("company");
  }, []);

  const beginDecisions = useCallback(() => {
    setScreen("decision");
  }, []);

  const handleDecision = useCallback((option) => {
    const decision = DECISIONS[decisionIndex];
    const demandMult = company.demand.multiplier;

    setMetrics((prev) => {
      const next = { ...prev };
      for (const key of Object.keys(option.impact)) {
        let delta = option.impact[key];
        // Demand multiplier amplifies negative risk/satisfaction impacts
        if ((key === "risk" || key === "satisfaction") && delta < 0) {
          delta = delta * demandMult;
        }
        next[key] = Math.max(0, Math.min(100, next[key] + delta));
      }
      return next;
    });

    setChoices((prev) => ({ ...prev, [decision.id]: option.id }));

    if (decisionIndex < DECISIONS.length - 1) {
      setDecisionIndex((prev) => prev + 1);
    } else {
      setScreen("dashboard");
    }
  }, [decisionIndex, company]);

  const replay = useCallback(() => {
    setScreen("welcome");
    setCompany(null);
    setDecisionIndex(0);
    setMetrics({ cost: 50, speed: 50, risk: 50, satisfaction: 50, sustainability: 50 });
    setChoices({});
    // Auto-start new game
    setTimeout(() => {
      const c = generateCompany();
      setCompany(c);
      setMetrics({ ...c.baseMetrics });
      setChoices({});
      setDecisionIndex(0);
      setScreen("company");
    }, 100);
  }, []);

  const totalSteps = DECISIONS.length;
  const currentStep = screen === "decision" ? decisionIndex + 1 : 0;

  return (
    <div className="app-container">
      <div className="bg-grid" />
      <div className="bg-glow bg-glow-1" />
      <div className="bg-glow bg-glow-2" />
      <div className="content-wrapper">
        <TopBar step={currentStep} totalSteps={totalSteps} />
        {screen !== "welcome" && <ProgressBar step={screen === "dashboard" ? totalSteps + 1 : currentStep} totalSteps={totalSteps} />}

        {screen === "welcome" && <WelcomeScreen onStart={startGame} />}
        {screen === "company" && company && <CompanyScreen company={company} onContinue={beginDecisions} />}
        {screen === "decision" && (
          <DecisionScreen
            key={decisionIndex}
            decision={DECISIONS[decisionIndex]}
            metrics={metrics}
            onSelect={handleDecision}
            stepIndex={decisionIndex}
          />
        )}
        {screen === "dashboard" && company && (
          <DashboardScreen company={company} metrics={metrics} choices={choices} onReplay={replay} />
        )}

        <footer style={{ textAlign: "center", padding: "40px 0 20px", color: "var(--text-muted)", fontSize: "12px" }}>
          Supply Chain Builder — 60-Day Claude Challenge · Day 30
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
